<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>楞次定律 - 磁场中的傲娇铝环</title>
  <link rel="stylesheet" href="../../styles.css">
</head>
<body class="page-experiment">
  <header class="exp-header">
    <div class="exp-title-row">
      <h1 class="exp-title" id="expTitle">楞次定律-磁场中的傲娇铝环</h1>
      <div class="exp-controls">
        <button type="button" class="btn btn-primary">开始实验</button>
        <button type="button" class="btn btn-primary">上一步</button>
        <button type="button" class="btn btn-primary">重置</button>
      </div>
    </div>
    <button type="button" class="btn btn-primary" onclick="window.history.back()">退出实验</button>
  </header>

  <div class="exp-main">
    <div class="exp-left">
      <div class="exp-display" id="expDisplay"></div>
      <footer class="exp-bottom">
        <p class="hint">请先点击「开始实验」，根据右侧的实验提示选择正确的实验器材。拖动磁铁靠近或远离铝环观察现象。</p>
        <div class="equipment-options equipment-disabled" id="equipmentOptions"></div>
        <div id="lenzControls" style="display:none;margin-top:12px">
          <button type="button" class="btn btn-primary" id="flipBtn">翻转磁铁</button>
          <p class="lenz-result" id="lenzResult" style="margin-top:8px;font-size:14px;color:#0ea5e9;min-height:1.5em"></p>
        </div>
      </footer>
    </div>
    <aside class="exp-sidebar">
      <div class="exp-step-box" id="expStepBox"></div>
    </aside>
  </div>

  <style>
    .lenz-scene { position: absolute; left: 50%; top: 50%; padding-top: 52px; display: flex; align-items: center; justify-content: center; overflow: hidden; transform-origin: center center; box-sizing: border-box; }
    .lenz-stand { position: absolute; top: 30%; left: 50%; transform: translateX(-50%); width: 420px; height: 10px; background: linear-gradient(90deg, #78716c, #57534e); border-radius: 5px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
    .lenz-stand::before { content: ''; position: absolute; top: -70px; left: 50%; transform: translateX(-50%); width: 12px; height: 80px; background: linear-gradient(180deg, #64748b, #475569); border-radius: 6px; }
    .lenz-ring-wrap { position: absolute; top: calc(30% - 44px); display: flex; flex-direction: column; align-items: center; }
    .lenz-ring { width: 44px; height: 44px; border: 3px solid #94a3b8; border-radius: 50%; background: rgba(248,250,252,0.9); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; color: #475569; transition: transform 0.4s ease; }
    .lenz-ring-wrap-a { left: 30%; }
    .lenz-ring-wrap-b { left: 70%; }
    .lenz-ring-b { border-color: #cbd5e1; }
    .lenz-ring-b::before { content: ''; position: absolute; top: 0; right: 4px; width: 10px; height: 100%; background: #f8fafc; border-radius: 0 4px 4px 0; }
    .lenz-ring-wrap-a .lenz-ring.reject { transform: translateX(-35px); }
    .lenz-ring-wrap-a .lenz-ring.follow { transform: translateX(25px); }
    .lenz-magnet { position: absolute; bottom: 18%; left: 35%; width: 90px; height: 28px; background: linear-gradient(90deg, #ef4444 0%, #1e293b 50%, #3b82f6 100%); border: 1px solid #334155; border-radius: 6px; display: flex; align-items: center; justify-content: space-between; padding: 0 10px; cursor: grab; user-select: none; z-index: 5; transition: box-shadow 0.2s; }
    .lenz-magnet:active { cursor: grabbing; }
    .lenz-magnet span { font-size: 12px; font-weight: bold; color: #fff; }
    .lenz-magnet.flipped { transform: scaleX(-1); }
  </style>

  <script>
    (function() {
      var data = {
        principle: '磁铁靠近或远离闭合铝环时，穿过铝环的磁通量变化产生感应电流。感应电流的磁场阻碍原磁场变化：磁铁靠近时排斥（来拒），远离时吸引（去留）。开口铝环不闭合，无法产生感应电流，对磁铁无反应。',
        equipment: ['杠杆支架', '闭合铝环A', '开口铝环B', '条形磁铁'],
        steps: [
          { title: '', desc: '两个铝环：A环完整闭合，B环有缺口。它们在磁铁面前会有截然不同的表现！' },
          { title: '步骤一', desc: '拖动磁铁慢慢靠近A环——A环往后退，好像在说"别过来"！来拒。' },
          { title: '步骤二', desc: '拖动磁铁靠近B环，B环纹丝不动。B环不闭合，无法产生感应电流。' },
          { title: '步骤三', desc: '拖动磁铁慢慢远离A环——A环跟着磁铁往前跑，舍不得它离开！去留。' },
          { title: '步骤四', desc: '翻转磁铁用S极再试，规律不变：靠近时躲开，远离时跟随。' },
          { title: '结论', desc: '楞次定律：感应电流的磁场阻碍磁通量变化。只有闭合回路才能产生感应电流。' }
        ]
      };

      document.getElementById('expTitle').textContent = '楞次定律-磁场中的傲娇铝环';

      var stepBox = document.getElementById('expStepBox');
      stepBox.innerHTML = '';
      data.steps.forEach(function(s) {
        var item = document.createElement('div');
        item.className = 'step-item';
        item.innerHTML = '<h4>' + s.title + '</h4><p>' + s.desc + '</p>';
        stepBox.appendChild(item);
      });

      var added = { stand: false, ringA: false, ringB: false, magnet: false };
      var stepHistory = [];
      var equipmentEnabled = false;
      var magnetFlipped = false;
      var ringAState = '';
      var magnetLeft = 35;

      function addEquipment(label) {
        if (label === '杠杆支架' && !added.stand) { added.stand = true; stepHistory.push('杠杆支架'); }
        else if (label === '闭合铝环A' && !added.ringA) { added.ringA = true; stepHistory.push('闭合铝环A'); }
        else if (label === '开口铝环B' && !added.ringB) { added.ringB = true; stepHistory.push('开口铝环B'); }
        else if (label === '条形磁铁' && !added.magnet) { added.magnet = true; stepHistory.push('条形磁铁'); magnetLeft = 35; }
        render();
      }

      function undoStep() {
        if (stepHistory.length === 0) return;
        var last = stepHistory.pop();
        if (last === '杠杆支架') added.stand = false;
        else if (last === '闭合铝环A') added.ringA = false;
        else if (last === '开口铝环B') added.ringB = false;
        else if (last === '条形磁铁') added.magnet = false;
        magnetFlipped = false;
        ringAState = '';
        magnetLeft = 35;
        document.getElementById('lenzControls').style.display = 'none';
        document.getElementById('lenzResult').textContent = '';
        render();
      }

      function updateRingFromMagnet() {
        var res = document.getElementById('lenzResult');
        if (!res) return;
        if (added.ringA) {
          if (magnetLeft < 28) {
            ringAState = 'follow';
            res.textContent = 'A环跟着往前跑！去留——感应电流的磁场吸引磁铁';
          } else if (magnetLeft > 42) {
            ringAState = 'reject';
            res.textContent = 'A环往后退！来拒——感应电流的磁场排斥磁铁靠近';
          } else {
            ringAState = '';
            res.textContent = '拖动磁铁靠近或远离A环观察来拒去留现象';
          }
        }
        if (added.ringB && magnetLeft > 58 && magnetLeft < 78) {
          res.textContent = 'B环纹丝不动！开口环不闭合，无法产生感应电流';
        }
      }

      function render() {
        var d = document.getElementById('expDisplay');
        var anyAdded = added.stand || added.ringA || added.ringB || added.magnet;
        var ready = added.stand && added.ringA && added.ringB && added.magnet;
        var magnetClass = 'lenz-magnet' + (magnetFlipped ? ' flipped' : '');

        d.innerHTML = '<div class="heat-principle" style="pointer-events:none"><strong>对应原理：</strong>' + data.principle + '</div>';
        if (anyAdded) {
          var ringAClass = 'lenz-ring lenz-ring-a' + (ringAState === 'reject' ? ' reject' : '') + (ringAState === 'follow' ? ' follow' : '');
          var sceneHtml = '';
          if (added.stand) sceneHtml += '<div class="lenz-stand"></div>';
          if (added.ringA) sceneHtml += '<div class="lenz-ring-wrap lenz-ring-wrap-a"><div class="' + ringAClass + '">A</div></div>';
          if (added.ringB) sceneHtml += '<div class="lenz-ring-wrap lenz-ring-wrap-b"><div class="lenz-ring lenz-ring-b">B</div></div>';
          if (added.magnet) sceneHtml += '<div class="' + magnetClass + '" id="lenzMagnet" style="left:' + magnetLeft + '%"><span>N</span><span>S</span></div>';
          d.innerHTML += '<div class="lenz-scene" id="lenzScene">' + sceneHtml + '</div>';
        }
        document.getElementById('lenzControls').style.display = ready ? 'block' : 'none';
        if (anyAdded && window.applyZoomCompensationLenz) window.applyZoomCompensationLenz();
        if (ready && added.magnet) setupMagnetDrag();
      }

      function setupMagnetDrag() {
        var magnet = document.getElementById('lenzMagnet');
        var scene = document.getElementById('lenzScene');
        if (!magnet || !scene) return;
        magnet.addEventListener('mousedown', function(e) {
          e.preventDefault();
          var startX = e.clientX;
          var sceneRect = scene.getBoundingClientRect();
          var startLeft = magnetLeft;
          function onMove(ev) {
            var dx = ev.clientX - startX;
            var deltaPercent = (dx / sceneRect.width) * 100;
            magnetLeft = Math.max(5, Math.min(82, startLeft + deltaPercent));
            magnet.style.left = magnetLeft + '%';
            updateRingFromMagnet();
            var ringA = document.querySelector('.lenz-ring-a');
            if (ringA) {
              if (magnetLeft < 28) { ringAState = 'follow'; ringA.className = 'lenz-ring lenz-ring-a follow'; }
              else if (magnetLeft > 42) { ringAState = 'reject'; ringA.className = 'lenz-ring lenz-ring-a reject'; }
              else { ringAState = ''; ringA.className = 'lenz-ring lenz-ring-a'; }
            }
          }
          function onUp() {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
          }
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });
      }

      function flipMagnet() {
        magnetFlipped = !magnetFlipped;
        document.getElementById('lenzResult').textContent = '已翻转磁铁，规律不变：靠近时躲开，远离时跟随';
        render();
      }

      function setupEquipment() {
        var eqEl = document.getElementById('equipmentOptions');
        eqEl.innerHTML = '';
        var iconMap = { '杠杆支架': '⚖️', '闭合铝环A': '⭕', '开口铝环B': '◐', '条形磁铁': '🧲' };
        data.equipment.forEach(function(label) {
          var div = document.createElement('div');
          div.className = 'equipment-item';
          div.dataset.eqLabel = label;
          div.innerHTML = '<span class="eq-icon">' + (iconMap[label] || '🔧') + '</span><span class="eq-name">' + label + '</span>';
          div.addEventListener('click', function() {
            if (eqEl.classList.contains('equipment-disabled')) return;
            eqEl.querySelectorAll('.equipment-item').forEach(function(it) { it.classList.remove('equipment-selected'); });
            div.classList.add('equipment-selected');
            addEquipment(label);
          });
          eqEl.appendChild(div);
        });
      }

      function checkReady() { return added.stand && added.ringA && added.ringB && added.magnet; }

      render();
      setupEquipment();

      window.applyZoomCompensationLenz = function() {
        var scene = document.getElementById('lenzScene');
        var display = document.getElementById('expDisplay');
        if (!scene || !display) return;
        var zoomScale = (window.visualViewport && window.visualViewport.scale) ? window.visualViewport.scale : 1;
        var baseW = 900, baseH = 500;
        var dr = display.getBoundingClientRect();
        var availW = dr.width;
        var availH = Math.max(dr.height - 52, 200);
        var fitScale = Math.min(1, availW / baseW, availH / baseH);
        var layoutW = baseW * zoomScale;
        var layoutH = baseH * zoomScale;
        scene.style.width = layoutW + 'px';
        scene.style.height = layoutH + 'px';
        scene.style.marginLeft = (-layoutW / 2) + 'px';
        scene.style.marginTop = (-layoutH / 2) + 'px';
        scene.style.transform = 'scale(' + (fitScale / zoomScale) + ')';
      };
      window.applyZoomCompensationLenz();
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', function() { window.applyZoomCompensationLenz && window.applyZoomCompensationLenz(); });
        window.visualViewport.addEventListener('scroll', function() { window.applyZoomCompensationLenz && window.applyZoomCompensationLenz(); });
      }
      window.addEventListener('resize', function() { window.applyZoomCompensationLenz && window.applyZoomCompensationLenz(); });

      document.querySelector('.exp-controls button:nth-child(1)').addEventListener('click', function() {
        equipmentEnabled = true;
        document.getElementById('equipmentOptions').classList.remove('equipment-disabled');
      });
      document.querySelector('.exp-controls button:nth-child(2)').addEventListener('click', undoStep);
      document.querySelector('.exp-controls button:nth-child(3)').addEventListener('click', function() { location.reload(); });

      document.getElementById('flipBtn').addEventListener('click', flipMagnet);
    })();
  </script>
</body>
</html>
