<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>杠杆平衡 - 物理实验</title>
  <link rel="stylesheet" href="../../styles.css">
</head>
<body class="page-experiment">
  <header class="exp-header">
    <div class="exp-title-row">
      <h1 class="exp-title" id="expTitle">物理实验——杠杆平衡</h1>
      <div class="exp-controls">
        <button type="button" class="btn btn-primary">开始实验</button>
        <button type="button" class="btn btn-primary">上一步</button>
        <button type="button" class="btn btn-primary">重置</button>
      </div>
    </div>
    <a href="/home" class="btn btn-primary">退出实验</a>
  </header>

  <div class="exp-main">
    <div class="exp-left">
      <div class="exp-display" id="expDisplay"></div>
      <footer class="exp-bottom">
        <p class="hint">请先点击「开始实验」，根据右侧的实验提示选择正确的实验器材。选齐后设置左右两侧的砝码数量和力臂距离（格数），点击「判断是否平衡」查看结果。</p>
        <div class="equipment-options equipment-disabled" id="equipmentOptions"></div>
        <div id="leverControls" style="display:none;margin-top:12px">
          <div class="lever-inputs">
            <div class="lever-side">
              <strong>左侧</strong>
              <label>砝码数量：<select id="leftCount"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option></select></label>
              <label>力臂(格)：<select id="leftDist"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option></select></label>
            </div>
            <div class="lever-side">
              <strong>右侧</strong>
              <label>砝码数量：<select id="rightCount"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option></select></label>
              <label>力臂(格)：<select id="rightDist"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option></select></label>
            </div>
          </div>
          <button type="button" class="btn btn-primary" id="balanceBtn">判断是否平衡</button>
          <div class="lever-result" id="leverResult"></div>
        </div>
      </footer>
    </div>
    <aside class="exp-sidebar">
      <div class="exp-step-box" id="expStepBox"></div>
    </aside>
  </div>

  <style>
    #expDisplay { position: relative; min-height: 300px; }
    .lever-principle { position: absolute; top: 0; left: 0; right: 0; padding: 10px 14px; background: rgba(14, 165, 233, 0.12); border-bottom: 1px solid #bae6fd; font-size: 13px; color: #0c4a6e; line-height: 1.5; z-index: 2; }
    .lever-scene { position: absolute; inset: 0; padding-top: 52px; overflow: hidden; background: #fff; }
    .lever-scene .lever-wrapper { position: absolute; left: 50%; top: 62%; width: 680px; height: 160px; transform: translate(-50%, -50%) scale(var(--leverScale, 1)); transform-origin: center center; }
    .lever-bar { position: absolute; left: 50%; top: 50%; height: 14px; background: linear-gradient(180deg, #94a3b8, #64748b); border-radius: 7px; transform-origin: 50% 50%; transform: translate(-50%, -50%); overflow: visible; z-index: 2; }
    .lever-bar::before { content: ''; position: absolute; left: 0; right: 0; top: 50%; height: 2px; transform: translateY(-50%); background: #ef4444; opacity: 0.9; border-radius: 999px; z-index: 1; }
    .lever-fulcrum { position: absolute; left: 50%; top: 50%; width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-bottom: 14px solid #475569; transform: translate(-50%, 6px); z-index: 1; }

    .lever-scale {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      pointer-events: none;
    }
    .lever-scale-number {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 11px;
      font-weight: 900;
      color: #111827;
      user-select: none;
      text-align: center;
    }

    .lever-weight { position: absolute; top: 50%; width: 32px; height: 32px; background: radial-gradient(circle at 35% 35%, #fef3c7, #f59e0b); border-radius: 50%; border: 2px solid #d97706; transform: translate(-50%, 10px); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; color: #92400e; z-index: 4; }
    .lever-weight::before { content: ''; position: absolute; left: 50%; top: -10px; width: 2px; height: 10px; transform: translateX(-50%); background: rgba(71, 85, 105, 0.9); border-radius: 999px; }
    .lever-inputs { display: flex; gap: 24px; margin-bottom: 12px; flex-wrap: wrap; }
    .lever-side { padding: 10px 16px; background: #f0f9ff; border-radius: 8px; border: 1px solid #bae6fd; }
    .lever-side strong { display: block; margin-bottom: 8px; color: #0c4a6e; }
    .lever-side label { display: block; margin-bottom: 6px; font-size: 13px; }
    .lever-side select { margin-left: 4px; padding: 2px 6px; }
    .lever-result { margin: 12px 0; padding: 10px 12px; background: #fff; border-radius: 6px; border: 2px solid #0ea5e9; font-size: 13px; color: #0c4a6e; min-height: 24px; }
  </style>

  <script>
    (function() {
      var data = {
        equipment: ['杠杆', '砝码'],
        steps: [
          { title: '步骤一', desc: '将杠杆支点固定，使其能自由转动。' },
          { title: '步骤二', desc: '在杠杆两侧悬挂砝码，设置左侧和右侧的砝码数量及力臂距离（格数）。' },
          { title: '步骤三', desc: '点击「判断是否平衡」，查看计算结果。当 F1×L1 = F2×L2 时，杠杆平衡。' }
        ]
      };

      document.getElementById('expTitle').textContent = '物理实验——杠杆平衡';
      var stepBox = document.getElementById('expStepBox');
      stepBox.innerHTML = '';
      data.steps.forEach(function(s) {
        var item = document.createElement('div');
        item.className = 'step-item';
        item.innerHTML = '<h4>' + s.title + '</h4><p>' + s.desc + '</p>';
        stepBox.appendChild(item);
      });

      var added = { lever: false, weight: false };
      var stepHistory = [];
      const GRID_PX = 40;

      function addEquipment(label) {
        if (label === '杠杆' && !added.lever) { added.lever = true; stepHistory.push('杠杆'); }
        else if (label === '砝码' && !added.weight) { added.weight = true; stepHistory.push('砝码'); }
        render();
      }

      function undoStep() {
        if (stepHistory.length === 0) return;
        var last = stepHistory.pop();
        if (last === '杠杆') added.lever = false;
        else if (last === '砝码') added.weight = false;
        document.getElementById('leverControls').style.display = 'none';
        render();
      }

      function getValues() {
        var leftCount = parseInt(document.getElementById('leftCount').value) || 1;
        var leftDist = parseInt(document.getElementById('leftDist').value) || 1;
        var rightCount = parseInt(document.getElementById('rightCount').value) || 1;
        var rightDist = parseInt(document.getElementById('rightDist').value) || 1;
        return { leftCount, leftDist, rightCount, rightDist };
      }

      function render() {
        const v = getValues();
        const leftMoment = v.leftCount * v.leftDist;
        const rightMoment = v.rightCount * v.rightDist;
        const diff = leftMoment - rightMoment;
        const tilt = Math.max(-10, Math.min(10, -diff * 1.4));
        const BAR_WIDTH = GRID_PX * 17;
        const CENTER = BAR_WIDTH / 2;
        const leftX = CENTER - v.leftDist * GRID_PX;
        const rightX = CENTER + v.rightDist * GRID_PX;

        const d = document.getElementById('expDisplay');
        const anyAdded = added.lever || added.weight;
        d.innerHTML = '<div class="lever-principle" style="pointer-events:none"><strong>对应原理：</strong>F1×L1 = F2×L2。每个砝码重量为 1 单位，力臂以格计。</div>';

        if (anyAdded) {
          let html = `
          <div class="lever-scene">
            <div class="lever-wrapper">
              <div class="lever-fulcrum"></div>
              <div class="lever-bar" style="width:${BAR_WIDTH}px;transform:translate(-50%,-50%) rotate(${tilt}deg)">
                <div class="lever-scale">`;

          // 刻度：-8 到 8，共17个，完美居中，全部贴在杠杆上
          for (let i = -8; i <= 8; i++) {
            const x = CENTER + i * GRID_PX;
            html += `<div class="lever-scale-number" style="left:${x}px">${Math.abs(i)}</div>`;
          }

          html += `</div>`;
          if (added.weight) {
            html += `<div class="lever-weight" style="left:${leftX}px">${v.leftCount}</div>`;
            html += `<div class="lever-weight" style="left:${rightX}px">${v.rightCount}</div>`;
          }
          html += `</div></div></div>`;
          d.innerHTML += html;
        }

        document.getElementById('leverControls').style.display = anyAdded ? 'block' : 'none';
        window.applyZoomCompensationLever?.();
      }

      function checkBalance() {
        const v = getValues();
        const left = v.leftCount * v.leftDist;
        const right = v.rightCount * v.rightDist;
        const res = left === right ? '平衡' : '不平衡';
        document.getElementById('leverResult').textContent =
          `左侧：${v.leftCount}×${v.leftDist}=${left}  右侧：${v.rightCount}×${v.rightDist}=${right} → ${res}`;
      }

      function setupEquipment() {
        const eqEl = document.getElementById('equipmentOptions');
        eqEl.innerHTML = '';
        const iconMap = { '杠杆': '⚖️', '砝码': '🔘' };
        data.equipment.forEach(label => {
          const div = document.createElement('div');
          div.className = 'equipment-item';
          div.innerHTML = `<span class="eq-icon">${iconMap[label]}</span><span class="eq-name">${label}</span>`;
          div.addEventListener('click', () => {
            if (eqEl.classList.contains('equipment-disabled')) return;
            eqEl.querySelectorAll('.equipment-item').forEach(it => it.classList.remove('equipment-selected'));
            div.classList.add('equipment-selected');
            addEquipment(label);
          });
          eqEl.appendChild(div);
        });
      }

      window.applyZoomCompensationLever = function() {
        const display = document.getElementById('expDisplay');
        const wrapper = display?.querySelector('.lever-wrapper');
        if (!wrapper) return;
        const rect = display.getBoundingClientRect();
        const scale = Math.min(1, rect.width / 680, (rect.height - 52) / 160);
        wrapper.style.setProperty('--leverScale', scale);
      };

      render();
      setupEquipment();
      window.applyZoomCompensationLever();
      window.addEventListener('resize', () => window.applyZoomCompensationLever?.());
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => window.applyZoomCompensationLever?.());
        window.visualViewport.addEventListener('scroll', () => window.applyZoomCompensationLever?.());
      }

      document.querySelector('.exp-controls button:nth-child(1)').onclick = () => {
        document.getElementById('equipmentOptions').classList.remove('equipment-disabled');
      };
      document.querySelector('.exp-controls button:nth-child(2)').onclick = undoStep;
      document.querySelector('.exp-controls button:nth-child(3)').onclick = () => location.reload();
      document.getElementById('balanceBtn').onclick = checkBalance;
      ['leftCount','leftDist','rightCount','rightDist'].forEach(id => {
        document.getElementById(id).addEventListener('change', render);
      });
    })();
  </script>
</body>
</html>
