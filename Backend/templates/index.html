<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物理题库 - 五大方向</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f7fa; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #4361ee 0%, #3a0ca3 100%); color: white; }
        .direction-card { 
            background: white; 
            border-radius: 10px; 
            transition: all 0.3s; 
            cursor: pointer;
            height: 100%;
            border: 1px solid #e9ecef;
        }
        .direction-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-color: #4361ee;
        }
        .question-count { 
            background: #e9ecef; 
            color: #495057; 
            padding: 2px 8px; 
            border-radius: 12px; 
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="header py-4 mb-4">
        <div class="container">
            <h1 class="text-center mb-3">物理题库系统</h1>
            <p class="text-center mb-0">选择物理学方向，开始答题练习</p>
        </div>
    </div>

    <div class="container">
        <div class="row g-4">
            {% for direction in directions %}
            <div class="col-md-4 col-lg-3">
                <div class="card direction-card h-100" onclick="startQuiz('{{ direction.id }}')">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <h5 class="card-title mb-0">{{ direction.name }}</h5>
                            <span class="question-count">{{ direction.question_count }}题</span>
                        </div>
                        <p class="card-text text-muted small">{{ direction.description }}</p>
                        <button class="btn btn-primary w-100 mt-3">开始答题</button>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

        <div class="text-center mt-5 text-muted">
            <small>每道题都有详细解析，点击选项查看答案，点击"确定"进入下一题</small>
        </div>
    </div>

    <script>
        function startQuiz(directionId) {
            window.location.href = `/question/quiz/${directionId}`;
        }
    </script>
</body>
</html>
