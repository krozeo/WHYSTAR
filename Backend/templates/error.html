<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错误 - 物理题库系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4">
    <div class="max-w-lg w-full bg-white rounded-xl shadow-sm p-8">
        <div class="flex items-center mb-4">
            <div class="w-12 h-12 bg-red-100 text-red-600 rounded-full flex items-center justify-center mr-4">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">发生错误</h1>
        </div>

        <p class="text-gray-600 mb-6">
            {{ error if error else "请求处理失败" }}
        </p>

        <div class="flex space-x-3">
            <a href="/info" class="inline-flex items-center px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700">
                <i class="fas fa-home mr-2"></i> 返回系统信息
            </a>
            <a href="/" class="inline-flex items-center px-4 py-2 rounded-lg bg-gray-100 text-gray-700 hover:bg-gray-200">
                返回首页
            </a>
        </div>
    </div>
</body>
</html>
